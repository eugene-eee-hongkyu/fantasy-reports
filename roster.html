<style>
:root {
  --bg: #0d1117; --surface: #161b22; --surface2: #21262d;
  --border: #30363d; --text: #e6edf3; --muted: #8b949e;
  --blue: #58a6ff; --green: #3fb950; --yellow: #d29922;
  --red: #f85149; --accent: #1f6feb;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
       background: var(--bg); color: var(--text); font-size: 14px; }
a { color: var(--blue); text-decoration: none; }
a:hover { text-decoration: underline; }

/* Header */
.page-header { background: var(--surface); border-bottom: 1px solid var(--border);
               padding: 14px 20px; display: flex; align-items: center;
               justify-content: space-between; flex-wrap: wrap; gap: 8px; }
.page-header h1 { font-size: 1.1rem; }
.page-header h1 .version-tag { color: var(--muted); font-size: 0.72rem;
                                font-weight: normal; margin-left: 8px;
                                font-family: "SF Mono", Consolas, monospace; }
.header-meta { display: flex; align-items: center; gap: 16px; color: var(--muted); font-size: 0.85rem; }

/* Layout */
.layout { display: flex; height: calc(100vh - 53px); overflow: hidden; }

/* Roster panel */
.roster-panel { width: 260px; min-width: 220px; background: var(--surface);
                border-right: 1px solid var(--border);
                overflow-y: auto; padding: 12px 8px; flex-shrink: 0; }
.pos-label { font-size: 0.75rem; font-weight: 700; color: var(--muted);
             text-transform: uppercase; letter-spacing: 0.08em;
             padding: 4px 8px; margin-bottom: 4px; }

/* Pickup section (SP/RP team-level analysis) */
.pickup-section { padding: 8px; margin-bottom: 12px;
                  border-bottom: 1px solid var(--border); }
.pickup-section .pos-label { margin-bottom: 6px; }
.pickup-btn { display: block; width: 100%; background: var(--surface2);
              border: 1px solid var(--border); border-radius: 6px;
              color: var(--text); padding: 9px 12px; cursor: pointer;
              font-size: 0.88rem; font-weight: 500; margin-bottom: 6px;
              text-align: left; transition: all 0.12s; }
.pickup-btn:hover { background: var(--accent); border-color: var(--blue); }
.pickup-btn.active { background: var(--accent); border-color: var(--blue);
                     color: #fff; }

/* Prompt panel */
.prompt-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.placeholder { flex: 1; display: flex; flex-direction: column;
               align-items: center; justify-content: center;
               color: var(--muted); font-size: 1rem; line-height: 2; text-align: center; }
.placeholder .arrow { font-size: 2rem; margin-bottom: 8px; }

.prompt-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.prompt-toolbar { display: flex; align-items: center; justify-content: space-between;
                  padding: 10px 16px; background: var(--surface);
                  border-bottom: 1px solid var(--border); gap: 12px; flex-wrap: wrap; }
.prompt-player { font-weight: 600; font-size: 0.95rem; }
.prompt-actions { display: flex; align-items: center; gap: 10px; }
.char-count { font-size: 0.8rem; color: var(--muted); }
.char-count.over { color: var(--red); font-weight: 600; }
.copy-btn { background: var(--accent); border: none; color: #fff;
            border-radius: 6px; padding: 6px 14px; cursor: pointer;
            font-size: 0.85rem; font-weight: 500; transition: opacity 0.15s; }
.copy-btn:hover { opacity: 0.85; }
.copy-btn.copied { background: var(--green); }

.limit-banner { background: rgba(248,81,73,0.12); border-bottom: 1px solid var(--red);
                padding: 8px 16px; font-size: 0.83rem; color: var(--red);
                display: flex; align-items: center; gap: 10px; }
.limit-banner button { background: var(--red); border: none; color: #fff;
                        border-radius: 4px; padding: 4px 10px; cursor: pointer;
                        font-size: 0.8rem; }

.copy-feedback { padding: 6px 16px; background: rgba(63,185,80,0.15);
                 color: var(--green); font-size: 0.82rem; border-bottom: 1px solid var(--border); }

#prompt-text { flex: 1; background: var(--bg); color: var(--text);
               border: none; resize: none; padding: 16px;
               font-family: "SF Mono", "Fira Code", Consolas, monospace;
               font-size: 0.82rem; line-height: 1.55; outline: none; }

/* Mobile */
@media (max-width: 640px) {
  /* dvh (dynamic viewport height) accounts for iOS Safari's collapsing
     toolbar; without it 100vh leaves the prompt panel partly hidden. */
  .layout { flex-direction: column; height: 100dvh; overflow: hidden; }
  .roster-panel { width: 100%; flex: 0 0 auto; max-height: 240px;
                  border-right: none; border-bottom: 1px solid var(--border); }
  /* Override desktop's `flex: 1` with min-height: 0 so the prompt panel
     can shrink correctly inside a column flex parent (otherwise the
     placeholder's natural size locks it at ~130px and the textarea is
     unreadable on mobile). */
  .prompt-panel { flex: 1 1 0; min-height: 0; }
}
</style>

  if (val === null || val === undefined) return '—';
  if (['AVG','OPS','ERA','WHIP'].includes(col)) return val.toFixed(3);
  if (col === 'IP') return val.toFixed(1);
  return String(Math.round(val));
}

function _fmtCat(cat, val) {
  if (val === null || val === undefined) return '—';
  if (['AVG','OPS','ERA','WHIP'].includes(cat)) return val.toFixed(3);
  return String(Math.round(val));
}

function _tableHeader(cols) {
  return '| 기간 | ' + cols.join(' | ') + ' |\n'
       + '|------|-' + cols.map(() => '---').join('-|-') + '-|';
}

// ── Risk-tag thresholds: 실측이 projection보다 얼마나 나빠야 위험 신호인가 ──
// SP/RP 임계값 차이는 RP의 단발 등판 변동성을 반영 (RP가 약간 더 관대).
// 타자는 ratio 스탯 변동이 크고 "이름값+ROS 회복"이 SP보다 자주 맞아 약간
// 더 관대한 임계값. 표본 게이트(IP/AB)가 있어 시즌 초반/소량 표본은 무시.
//
// 절대 gap + 비율 gap 두 trigger를 OR 로 묶음 (#6 form_signal 정밀화):
//   절대만 보면 elite 자원의 평소 대비 부진이 안 잡힘
//   (예: ERA 2.0 → 3.0 = 50% 손실인데 절대 +1.0 임계값에 걸려 통과).
//   비율 trigger를 같이 두면 elite 부진도 잡힌다.
const _RISK = {
  // 5월 초 SP swing/spot starter도 평가 가능하도록 게이트 완화 (이전: SP 30/12,
  // RP 15/5). fallback 게이트(d30, d7)도 같이 완화.
  sp:  {seasonIp: 20, d14Ip: 9, d30Ip: 10, d7Ip: 4,
        seasonEra: 1.0, seasonWhip: 0.20, d14Era: 1.5, d14Whip: 0.30,
        seasonEraRatio: 1.40, seasonWhipRatio: 1.25,
        d14EraRatio:    1.60, d14WhipRatio:    1.35},
  rp:  {seasonIp: 10, d14Ip: 3, d30Ip: 5,  d7Ip: 2,
        seasonEra: 1.5, seasonWhip: 0.25, d14Era: 2.0, d14Whip: 0.40,
        seasonEraRatio: 1.50, seasonWhipRatio: 1.30,
        d14EraRatio:    1.80, d14WhipRatio:    1.45},
  bat: {seasonAvg: 0.030, seasonOps: 0.080, d14Avg: 0.050, d14Ops: 0.150,
        seasonAvgRatio: 0.88, seasonOpsRatio: 0.85,
        d14AvgRatio:    0.82, d14OpsRatio:    0.78},
};

// ── Batter pickup helpers ────────────────────────────────────────────────────
const _BAT_POSITIONS = ['C', '1B', '2B', '3B', 'SS', 'OF'];

function _batScore(stats) {
  // 합성: R + RBI + HR + SB*1.5. _rosScore와 동일.
  return (stats.R || 0) + (stats.RBI || 0) + (stats.HR || 0)
       + (stats.SB || 0) * 1.5;
}

function _dualBonus(positions) {
  // 다중 포지션 자격은 라인업 유연성으로 가치가 약간 더 큼.
  // 자격 N개 → × (1 + (N-1) × 0.05). 2자격 +5%, 3자격 +10%.
  const n = (positions || []).filter(p => _BAT_POSITIONS.includes(p)).length;
  return 1 + Math.max(0, n - 1) * 0.05;
}

// ── Tier breakdown helpers ───────────────────────────────────────────────────
// LLM이 "왜 이 tier인가"를 component 점수로 cross-reference 가능하게 한다.
function _spTierBreakdownLines(playerIds) {
  // playerIds: 우리 SP 선수의 id 집합 (Set 또는 array). null이면 전부.
  const details = DATA.roster_sp_tier_details || [];
  if (!details.length) return [];
  const idSet = playerIds ? new Set(playerIds) : null;
  const subset = idSet ? details.filter(d => idSet.has(d.player_id)) : details;
  if (!subset.length) return [];
  // tier 순서 정렬 (Streaming → Conditional → Core), 같은 tier는 score 오름차순
  const tierRank = { 'Streaming': 0, 'Conditional': 1, 'Core': 2 };
  const sorted = subset.slice().sort((a, b) => {
    const ra = tierRank[a.tier] ?? 99;
    const rb = tierRank[b.tier] ?? 99;
    if (ra !== rb) return ra - rb;
    return (a.core_score || 0) - (b.core_score || 0);
  });
  const lines = [];
  lines.push('### tier 분해 (우리 SP — `0.50 ros_value + 0.30 team_fit + 0.20 reacquire`)');
  lines.push('');
  lines.push('| 선수 | tier | core_score | ros_value | team_fit | reacquire | ip_remaining |');
  lines.push('|---|---|---|---|---|---|---|');
  for (const d of sorted) {
    lines.push('| ' + d.name + ' | ' + d.tier
      + ' | ' + Number(d.core_score).toFixed(1)
      + ' | ' + Number(d.ros_value).toFixed(2)
      + ' | ' + Number(d.team_fit).toFixed(2)
      + ' | ' + Number(d.reacquire_proxy).toFixed(2)
      + ' | ' + Number(d.ip_ros_remaining).toFixed(0)
      + ' |');
  }
  lines.push('');
  return lines;
}

function _calcRiskTags(player) {
  // Returns array of warning tags. Empty = no risk signal.
  // Logic: 실측(long-window: 시즌 또는 30d / short-window: 14d 또는 7d)
  //         vs projection(proj_ros). 임계값 초과 시 위험.
  // waiver 후보는 종종 season/14d가 비어 있고 proj_ros + projected만 있음
  // (스크래퍼 union 한계). 그럴 땐 30d/7d로 폴백, 둘 다 없으면 ℹ️ 데이터
  // 부족 태그를 줘서 LLM이 risk 판단 불가임을 알 수 있게 한다.
  const ros = player.stats['proj_ros'] || {};
  const seasonRaw = player.stats['2026'] || player.stats['season'] || {};
  const d30 = player.stats['30d'] || {};
  const d14 = player.stats['14d'] || {};
  const d7  = player.stats['7d'] || {};
  const positions = player.positions || [];
  const isPitcher = !!player.pitcher;
  // 듀얼(SP+RP)은 SP 기준(더 엄격) 적용
  const role = isPitcher
    ? (positions.includes('SP') ? 'sp' : 'rp')
    : 'bat';

  // Track raw data presence (any non-empty stats dict) separately from IP-gated
  // source selection. This lets us distinguish two failure modes:
  //  · "데이터 없음": waiver 정렬 상위 미달 → stats 자체가 비어 있음 (약한 음성)
  //  · "표본 부족": stats 있으나 IP 게이트 미달 → noise 가능, 평가 보류
  const longHasData =
    (seasonRaw && Object.keys(seasonRaw).length) ||
    (d30 && Object.keys(d30).length);
  const shortHasData =
    (d14 && Object.keys(d14).length) ||
    (d7 && Object.keys(d7).length);

  // Pick long-window source (season > 30d) gated by IP for pitchers.
  let longSrc = null;
  if (isPitcher) {
    const t = _RISK[role];
    if ((seasonRaw.IP || 0) >= t.seasonIp) longSrc = seasonRaw;
    else if ((d30.IP || 0) >= t.d30Ip) longSrc = d30;
  } else {
    if (seasonRaw && Object.keys(seasonRaw).length) longSrc = seasonRaw;
    else if (d30 && Object.keys(d30).length) longSrc = d30;
  }

  // Pick short-window source (14d > 7d).
  let shortSrc = null;
  if (isPitcher) {
    const t = _RISK[role];
    if ((d14.IP || 0) >= t.d14Ip) shortSrc = d14;
    else if ((d7.IP || 0) >= t.d7Ip) shortSrc = d7;
  } else {
    if (d14 && Object.keys(d14).length) shortSrc = d14;
    else if (d7 && Object.keys(d7).length) shortSrc = d7;
  }

  // Coverage signals — split into two distinct tags
  if (!longSrc && !shortSrc) {
    if (longHasData || shortHasData) return ['ℹ️ 표본 부족'];
    return ['ℹ️ 데이터 없음'];
  }

  let longBad = false;
  let shortBad = false;

  // 절대 gap (a) 과 비율 gap (r) 의 OR — 둘 중 하나면 bad.
  // 비율 gap 은 elite 자원이 평소 대비 부진할 때만 잡히고
  // (ERA 2 → 3 = ratio 1.50), 절대 gap 은 평균 자원 큰 부진에 강함
  // (ERA 4 → 5.5 = +1.5). 둘 다 두면 보완.
  const _gtA = (a, b, thr) => (a != null && b != null && (a - b) > thr);
  const _gtR = (num, den, thr) => (num != null && den != null && den > 0 && num / den > thr);
  const _ltR = (num, den, thr) => (num != null && den != null && den > 0 && num / den < thr);

  if (isPitcher) {
    const t = _RISK[role];
    if (longSrc) {
      if (_gtA(longSrc.ERA,  ros.ERA,  t.seasonEra)
       || _gtR(longSrc.ERA,  ros.ERA,  t.seasonEraRatio))  longBad = true;
      if (_gtA(longSrc.WHIP, ros.WHIP, t.seasonWhip)
       || _gtR(longSrc.WHIP, ros.WHIP, t.seasonWhipRatio)) longBad = true;
    }
    if (shortSrc) {
      if (_gtA(shortSrc.ERA,  ros.ERA,  t.d14Era)
       || _gtR(shortSrc.ERA,  ros.ERA,  t.d14EraRatio))  shortBad = true;
      if (_gtA(shortSrc.WHIP, ros.WHIP, t.d14Whip)
       || _gtR(shortSrc.WHIP, ros.WHIP, t.d14WhipRatio)) shortBad = true;
    }
  } else {
    const t = _RISK.bat;
    if (longSrc) {
      if (_gtA(ros.AVG, longSrc.AVG, t.seasonAvg)
       || _ltR(longSrc.AVG, ros.AVG, t.seasonAvgRatio)) longBad = true;
      if (_gtA(ros.OPS, longSrc.OPS, t.seasonOps)
       || _ltR(longSrc.OPS, ros.OPS, t.seasonOpsRatio)) longBad = true;
    }
    if (shortSrc) {
      if (_gtA(ros.AVG, shortSrc.AVG, t.d14Avg)
       || _ltR(shortSrc.AVG, ros.AVG, t.d14AvgRatio)) shortBad = true;
      if (_gtA(ros.OPS, shortSrc.OPS, t.d14Ops)
       || _ltR(shortSrc.OPS, ros.OPS, t.d14OpsRatio)) shortBad = true;
    }
  }

  const tags = [];
  if (longBad && shortBad) tags.push('⚠️⚠️ 추천 위험');
  else if (longBad) tags.push('⚠️ 시즌 부진');
  else if (shortBad) tags.push('⚠️ 폼 하락');
  return tags;
}

function _tableRow(label, stats, cols) {
  const vals = cols.map(c => _fmt(c, stats ? stats[c] : null));
  return '| ' + label + ' | ' + vals.join(' | ') + ' |';
}

// Smart 25: 3-axis union
function _formScore(ap) {
  const s = ap.stats['7d'] || ap.stats['projected'];
  if (!s) return null;
  const ip = s.IP || 0;
  const minIp = ap.pitcher ? 2.0 : 1.0;
  if (ip < minIp) return null;
  if (ap.pitcher) {
    const svh = (s['SV+H'] || 0);
    const k = (s.K || 0);
    const er = Math.max(0, ip * ((s.ERA || 0) / 9));
    const raw = svh * 3.0 + k * 0.5 - er * 1.0;
    return raw * Math.sqrt(Math.min(ip, 10.0));
  } else {
    // batter
    const raw = (s.R||0)*1.0 + (s.HR||0)*2.0 + (s.RBI||0)*1.0 + (s.SB||0)*1.5;
    const pa = s['PA'] || ip || 5;
    return raw * Math.sqrt(Math.min(pa, 25.0));
  }
}

// ── SP/RP team-level pickup prompt ───────────────────────────────────────────

function _pickupSummaryLine(pitcherType, myPitchers, cats) {
  // "내 SP 합계: K=X (5위 vs 1위 Y, ↑Z) ..." 같은 한 줄 진단.
  // 카테고리 SP 픽업의 직접 영향(W/K/ERA/WHIP) 또는 RP의 직접 영향(SV+H/K/ERA/WHIP)에
  // 대해 내 합계와 standings에서의 위치를 짝지어 보여준다.
  if (!cats || !cats.length) return '';
  const focusKeys = pitcherType === 'SP'
    ? ['IP', 'W', 'K', 'ERA', 'WHIP']
    : ['SV+H', 'K', 'ERA', 'WHIP', 'IP'];
  const sums = {};
  for (const k of focusKeys) sums[k] = 0;
  let n = 0;
  for (const p of myPitchers) {
    const ros = p.stats['proj_ros'] || {};
    n++;
    for (const k of focusKeys) {
      if (ros[k] !== null && ros[k] !== undefined) sums[k] += ros[k];
    }
  }
  if (!n) return '';
  // ratio 스탯(ERA/WHIP)은 합산 의미 없으니 평균
  const ratioKeys = new Set(['ERA', 'WHIP']);
  const parts = [];
  for (const k of focusKeys) {
    const isRatio = ratioKeys.has(k);
    const myVal = isRatio ? (sums[k] / n) : sums[k];
    const cat = cats.find(c => c.category === k);
    let suffix = '';
    if (cat) suffix = ' (' + cat.rank + '위 vs 1위 ' + _fmtCat(k, cat.value_leader) + ')';
    parts.push(k + '=' + _fmtCat(k, myVal) + suffix);
  }
  return parts.join(', ');
}

function _sortedPitcherCandidates(pitcherType, n) {
  // 2축 union: proj_ros 합성(잔여 가치) 상위 + 2026 시즌 합성(시즌 검증) 상위.
  // 단일 정렬(proj_ros만)은 projection 강한 후보가 풀을 독점하고, 그 후보들은
  // 종종 시즌 정렬에 안 들어 시즌 데이터가 빈다(스크래퍼 union 한계). 두 축으로
  // 뽑으면 (a) 시즌 검증된 후보가 풀에 들어오고 (b) 그 후보들의 시즌 데이터는
  // 자동으로 채워져 있어 risk 태그 평가 가능.
  // SP: K + W*5 (W가 K의 ~15분의 1 볼륨이라 가중). RP: SV+H 단일.
  const pool = (DATA.available[pitcherType] || []).slice();
  const halfN = Math.ceil(n / 2);

  function _spScore(stats) {
    return (stats.K || 0) + (stats.W || 0) * 5;
  }
  function _rpScore(stats) {
    return stats['SV+H'] || 0;
  }
  const scoreFn = pitcherType === 'SP' ? _spScore : _rpScore;

  function _projStats(p)   { return p.stats['proj_ros'] || {}; }
  function _seasonStats(p) { return p.stats['2026'] || p.stats['season'] || {}; }
  const byProj = [...pool].sort((a, b) =>
    scoreFn(_projStats(b)) - scoreFn(_projStats(a))
  ).slice(0, halfN);
  const bySeason = [...pool].sort((a, b) =>
    scoreFn(_seasonStats(b)) - scoreFn(_seasonStats(a))
  ).slice(0, halfN);

  const seen = new Set();
  const result = [];
  for (const p of byProj) {
    if (!seen.has(p.id)) { seen.add(p.id); result.push(p); }
  }
  for (const p of bySeason) {
    if (!seen.has(p.id)) { seen.add(p.id); result.push(p); }
  }
  return result;
}

function buildPitcherPickupPrompt(pitcherType) {
  const lines = [];
  const decisionKey = pitcherType.toLowerCase();
  lines.push('[데이터 기준: ' + DATA.meta.generated_at + ']');
  lines.push(_tierMetaLine());
  lines.push('');

  // 1. Standings + 카테고리 우선순위
  const cats = DATA.standings
    ? (pitcherType === 'SP' ? DATA.standings.all_cats_sp : DATA.standings.all_cats_rp)
    : null;
  if (DATA.standings) {
    const st = DATA.standings;
    lines.push('## 우리 팀: ' + st.my_team_name + ' (' + st.total_teams + '팀 Roto)');
    lines.push('');
    lines.push('| 카테고리 | 내 순위 | 내 값 | 1위 값 |');
    lines.push('|---|---|---|---|');
    for (const c of cats) {
      lines.push('| ' + c.category + ' | ' + c.rank + '위 | '
        + _fmtCat(c.category, c.value) + ' | '
        + _fmtCat(c.category, c.value_leader) + ' |');
    }
    lines.push('');

    lines.push('### 카테고리 우선순위 (' + pitcherType + ' 픽업 관점)');
    lines.push('');
    if (pitcherType === 'SP') {
      lines.push('이 결정: SP 픽업 — 매주 1-2등판. W·K·ERA·WHIP 직접 영향. SV+H·IP는 이 결정으로 바뀌지 않음.');
    } else {
      lines.push('이 결정: RP 픽업 — 매주 3-5등판. SV+H·ERA·WHIP·K 직접 영향. W는 부수적.');
    }
    lines.push('');

    const grp = {high: [], low: [], normal: []};
    for (const c of cats) {
      const k = c.impact || 'normal';
      if (grp[k]) grp[k].push('- ' + c.category + ': ' + c.tier + ' — ' + c.note);
    }
    if (grp.high.length) {
      lines.push('직접 영향 (이 결정으로 따낼 수 있는 점수):');
      grp.high.forEach(l => lines.push(l));
      lines.push('');
    }
    if (grp.low.length) {
      lines.push('한계 영향:');
      grp.low.forEach(l => lines.push(l));
      lines.push('');
    }
    if (grp.normal.length) {
      lines.push('참고:');
      grp.normal.forEach(l => lines.push(l));
      lines.push('');
    }
  }

  // 2. 내 투수진 현황 표 — tier 분류 + 듀얼 자격 분리
  const spTiers = DATA.roster_sp_tiers || {};
  const spTierDetails = (DATA.roster_sp_tier_details || []).reduce(
    (acc, d) => { acc[d.player_id] = d; return acc; }, {}
  );
  const todaySpIds = new Set(DATA.sp_starting_today || []);
  const tomorrowSpIds = new Set(DATA.sp_starting_tomorrow || []);
  const myCols = pitcherType === 'SP'
    ? ['IP', 'W', 'K', 'ERA', 'WHIP']
    : ['SV+H', 'K', 'ERA', 'WHIP', 'IP'];

  // 모든 기간을 셀로 보여준다. 우리 로스터 선수는 6개 기간 모두 수집되므로
  // 단기(7d/14d/30d) → 시즌(2026) → 미래(projected/proj_ros) 흐름을 LLM이
  // 한 행에서 비교할 수 있어야 단발 등판/장기 가치/회복 추세 판단이 정확해진다.
  const _PITCHER_PERIODS = [
    {key: '7d',        label: '7d'},
    {key: '14d',       label: '14d'},
    {key: '30d',       label: '30d'},
    {key: '2026',      label: '2026'},
    {key: 'projected', label: '다음7일'},
    {key: 'proj_ros',  label: '잔여'},
  ];

  function _pitcherTableHeader(cols) {
    const periodHeaders = _PITCHER_PERIODS.map(
      pe => pe.label + ' ' + cols.join('/')
    ).join(' | ');
    const sep = ['---', '---', '---'].concat(_PITCHER_PERIODS.map(() => '---')).join('|');
    return [
      '| 선수 | 슬롯 | 부상 | ' + periodHeaders + ' |',
      '|' + sep + '|',
    ];
  }

  function _renderPitcherRow(p, cols, opts) {
    // cols: which stat columns to render (SP cols vs RP cols).
    // opts.showRpEligibility: when true, append " (RP)" to slot for SP+RP duals
    // (used in the SP-roster table inside the RP pickup prompt so the LLM can
    // see which SPs are RP-eligible and could fill an RP slot directly).
    opts = opts || {};
    const periodCells = _PITCHER_PERIODS.map(pe => {
      const s = p.stats[pe.key] || {};
      return cols.map(c => _fmt(c, s[c])).join('/');
    });
    const tags = [];
    if (spTiers[p.id]) {
      const det = spTierDetails[p.id];
      const score = det && det.core_score != null
        ? '·' + Number(det.core_score).toFixed(0)
        : '';
      tags.push(spTiers[p.id] + score);
    }
    if (todaySpIds.has(p.id)) tags.push('🔄 오늘 등판');
    if (tomorrowSpIds.has(p.id)) tags.push('🔄 내일 등판');
    for (const r of _calcRiskTags(p)) tags.push(r);
    const tagStr = tags.length ? ' [' + tags.join('·') + ']' : '';
    let slot = p.slot || '-';
    if (opts.showRpEligibility && (p.positions || []).includes('RP')) {
      slot += ' (RP 자격)';
    }
    return '| ' + p.name + tagStr + ' | ' + slot + ' | ' + p.injury
      + ' | ' + periodCells.join(' | ') + ' |';
  }

  if (pitcherType === 'SP') {
    const mySps = DATA.roster.filter(p => p.pitcher && (p.positions || []).includes('SP'));
    lines.push('## 내 SP 현황 (' + mySps.length + '명)');
    lines.push('');
    lines.push('태그: [Core/Conditional/Streaming] = `0.50 × ros_value + 0.30 × team_fit + 0.20 × reacquire`, 풀=내 로스터+%Ros≥5% waiver SP/RP (replacement-level baseline). 임계값: ≥65 Core / 50~65 Conditional / <50 Streaming. ros_value=풀 percentile, team_fit=약점 카테고리 sigmoid z, reacquire=%Ros. [🔄 오늘/내일 등판]=MLB 일정 — 단발 가치 자원이라 보유 결정과 별도. 위험 태그=실측 vs ROS 절대 gap **OR 비율 gap** (elite 자원 평소 대비 부진도 잡힘).');
    lines.push('');
    for (const h of _pitcherTableHeader(myCols)) lines.push(h);
    for (const p of mySps) lines.push(_renderPitcherRow(p, myCols));
    lines.push('');

    const summary = _pickupSummaryLine('SP', mySps, cats);
    if (summary) {
      lines.push('내 SP 잔여시즌 합계 (ratio는 평균): ' + summary);
      lines.push('');
    }
    // tier 분해 — 우리 SP 전체 (왜 Core/Conditional/Streaming인지 component 가시화)
    for (const h of _spTierBreakdownLines(mySps.map(p => p.id))) lines.push(h);
  } else {
    // RP 분기: 실제 RP 표 + SP 진영 전체 표(RP 자리를 만들기 위한 정리 후보 검토용).
    // 이전에는 "RP 자격 있는 SP 듀얼"만 분리해 보여줬는데, 그러면 RP 자격이
    // 없는 Streaming SP(예: Christian Scott, Canning)는 표에 안 보임.
    // 사용자 결정 흐름은 "어느 SP를 정리해서 RP 자리로 전환할지"이므로 SP
    // 자격 전체를 보여주는 게 맞음. 듀얼 자격은 슬롯 옆 "(RP 자격)" 표시로 전달.
    const myRps = DATA.roster.filter(p => p.pitcher && (p.positions || []).includes('RP'));
    const pureRps = myRps.filter(p => !spTiers[p.id]);

    lines.push('## 내 RP 현황 (실제 RP ' + pureRps.length + '명)');
    lines.push('');
    for (const h of _pitcherTableHeader(myCols)) lines.push(h);
    for (const p of pureRps) lines.push(_renderPitcherRow(p, myCols));
    lines.push('');

    const summaryPure = _pickupSummaryLine('RP', pureRps, cats);
    if (summaryPure) {
      lines.push('내 실제 RP 잔여시즌 합계 (ratio는 평균): ' + summaryPure);
      lines.push('');
    }

    // SP 진영 전체 표 — RP 자리 마련을 위한 정리 후보 검토
    const mySps = DATA.roster.filter(p => p.pitcher && (p.positions || []).includes('SP'));
    if (mySps.length) {
      lines.push('## 내 SP 진영 (' + mySps.length + '명) — RP 자리 마련을 위한 정리 후보 검토용');
      lines.push('');
      lines.push('태그 의미: [Core/Conditional/Streaming] = `0.50 ros_value + 0.30 team_fit + 0.20 reacquire`, 풀=내 로스터+active waiver SP/RP. ≥65 Core / 50~65 Conditional / <50 Streaming. [🔄 오늘/내일 등판]=MLB 일정. 슬롯 옆 (RP 자격) = SP/RP 듀얼 자격이라 RP 슬롯 직투입 가능. **Streaming tier + 등판 태그 붙은 SP는 등판 후 정리해서 RP 자리로 전환 가능**. Core/Conditional은 장기 보유 자원이라 자르지 말 것.');
      lines.push('');
      const spCols = ['IP', 'W', 'K', 'ERA', 'WHIP'];
      for (const h of _pitcherTableHeader(spCols)) lines.push(h);
      for (const p of mySps) {
        lines.push(_renderPitcherRow(p, spCols, {showRpEligibility: true}));
      }
      lines.push('');
      // tier 분해 — SP 진영 (어느 SP를 정리할지 선택 근거)
      for (const h of _spTierBreakdownLines(mySps.map(p => p.id))) lines.push(h);
    }
  }

  // 3. Available 후보 — 2축 union (각 축 상위 절반씩, 중복 제거)
  const candN = 30;
  const sortLabel = pitcherType === 'SP'
    ? 'proj_ros K+W*5 상위 15 ∪ 2026 시즌 K+W*5 상위 15'
    : 'proj_ros SV+H 상위 15 ∪ 2026 시즌 SV+H 상위 15';
  const candidates = _sortedPitcherCandidates(pitcherType, candN);
  lines.push('## ' + pitcherType + ' 보강 후보 (' + candidates.length + '명, ' + sortLabel + ')');
  lines.push('');
  for (const ap of candidates) {
    const hotTag = ap.is_hot ? ' 🔥' : '';
    const risk = _calcRiskTags(ap);
    const riskStr = risk.length ? ' [' + risk.join('·') + ']' : '';
    lines.push('### ' + ap.name + ' (' + ap.team + ')' + hotTag + riskStr
      + '  픽업률 ' + (ap.add_pct || 0) + '%  부상: ' + ap.injury);
    lines.push(_tableHeader(myCols));
    for (const period of DATA.periods) {
      const label = DATA.period_labels[period];
      // "7d → projected" fallback은 잘못된 매핑 (next 7d projection을 last 7d
      // 실측으로 표시). 제거. "2026 → season"은 같은 시즌 누적이라 OK.
      const stats = ap.stats[period]
        || (period === '2026' ? ap.stats['season'] : null)
        || null;
      lines.push(_tableRow(label, stats, myCols));
    }
    lines.push('');
  }

  // 4. 질문 + 답변 형식
  lines.push('## 요청');
  lines.push('');
  if (pitcherType === 'SP') {
    lines.push('내 SP 진영을 보고, 가장 약한 자리 1개와 그 자리에 가져올 후보 1명을 추천해라.');
    lines.push('- 직접 영향 카테고리(공략권) 기준으로 무엇을 우선 보강할지 명확히');
    lines.push('- 잔여시즌 K·W·ERA·WHIP 4축으로 비교');
    lines.push('- 14일 폼이 잔여시즌 프로젝션과 크게 다르면 언급');
    lines.push('- **자원 종류 분리**: [Streaming] tier 또는 [🔄 오늘/내일 등판] 태그가 붙은 SP는 단발/스트리밍 슬롯으로 봐야 한다 — 등판 후 정리 가능한 자원. [Core] / [Conditional]은 장기 보유 자원이라 같은 풀로 비교하면 안 됨.');
    lines.push('- **위험 태그 규칙 (반드시 준수)**: `[⚠️⚠️ 추천 위험]` = 1순위 금지 / `[⚠️ 시즌 부진]` `[⚠️ 폼 하락]` = ratio 리스크 명시 필수 / `[ℹ️ 데이터 없음]` = 약한 음성 신호 (waiver 정렬 상위 미달, 단 부상은 예외) / `[ℹ️ 표본 부족]` = stats 있지만 IP 표본 작아 noise 가능, 1순위 추천 시 표본 작음 명시 필수. 잔여 예상이 좋아도 실측이 나쁘면 실측 우선.');
    lines.push('- "보강 안 하고 Hold"가 정답이면 그렇게 답해도 됨');
  } else {
    lines.push('내 RP 진영을 보고, 보강이 필요하면 어느 자리에 누구를 가져올지 추천해라.');
    lines.push('- SV+H 누적이 1순위 기준 (사용자 점수 카테고리)');
    lines.push('- K·ERA·WHIP 안전성도 같이 평가');
    lines.push('- 신예 후보(낮은 픽업률 + 높은 SV+H)도 후보에 포함해서 검토');
    lines.push('- **결정 흐름**: 위 표 두 개를 같이 본다.');
    lines.push('  · "실제 RP" 표: RP 보강 1차 비교 대상. 가장 약한 자리부터 교체');
    lines.push('  · "내 SP 진영" 표: RP 자리 마련을 위한 정리 후보. Streaming tier + 등판 태그 = 등판 후 정리해서 RP로 전환 가능. (RP 자격) 슬롯 표시는 RP 슬롯 직접 이동 가능');
    lines.push('  · Core/Conditional SP는 장기 보유 자원이라 RP 자리 마련 위해 자르지 말 것');
    lines.push('- **위험 태그 규칙 (반드시 준수)**: `[⚠️⚠️ 추천 위험]` = 1순위 금지 / `[⚠️ 시즌 부진]` `[⚠️ 폼 하락]` = ratio 리스크 명시 필수 / `[ℹ️ 데이터 없음]` = 약한 음성 신호 (waiver 정렬 상위 미달, 단 부상은 예외) / `[ℹ️ 표본 부족]` = stats 있지만 IP 표본 작아 noise 가능, 1순위 추천 시 표본 작음 명시 필수. 잔여 예상이 좋아도 실측이 나쁘면 실측 우선.');
    lines.push('- "보강 안 하고 Hold"가 정답이면 그렇게 답해도 됨');
  }
  lines.push('');
  lines.push('## 답변 형식 (반드시 준수)');
  lines.push('');
  lines.push('### 결론');
  lines.push('- **권장 액션**: 즉시 교체 / 조건부 교체 / 보류 (Hold) — 셋 중 하나만');
  lines.push('  · "즉시 교체" = 지금 바로 drop/add 실행');
  lines.push('  · "조건부 교체" = 특정 시점/조건 도달 후 실행 (예: 내일 등판 후, 7일 데이터 확인 후)');
  lines.push('  · "보류" = 현 상태 유지');
  lines.push('- 교체 페어: [내 선수] → [후보] (또는 "Hold")');
  lines.push('- **액션 사유**: 한 문장으로, 왜 위 액션 카테고리를 선택했는지. 위험 태그·자원 종류·매치업·실측 데이터를 1개 이상 직접 인용');
  lines.push('- **트리거 조건**: 즉시 교체가 아니면 어떤 조건이 만족돼야 실행되는지 (또는 보류면 무엇이 바뀌면 재검토하는지) 구체적으로');
  lines.push('');
  lines.push('### Top 3 후보 비교');
  const criterion = pitcherType === 'SP' ? 'K + W*5 합성' : 'SV+H 잔여시즌 합산';
  lines.push('(' + criterion + ' 기준 상위 3명, 카테고리 임팩트와 리스크 함께)');
  lines.push('| 후보 | 카테고리 임팩트 | 리스크 | 추천 순위 |');
  lines.push('|---|---|---|---|');
  lines.push('');
  lines.push('### 근거');
  lines.push('[3-5문장 — 결론의 액션 사유를 더 자세히 풀어쓰기. 데이터 인용 필수]');

  return lines.join('\n');
}

// ── SP streaming compare prompt — tomorrow's start swap decision ─────────────

function buildSPStreamComparePrompt() {
  const lines = [];
  lines.push('[데이터 기준: ' + DATA.meta.generated_at + ']');
  lines.push(_tierMetaLine());
  lines.push('');
  lines.push('# 내일 SP 스트림 비교 (one-day swap decision)');
  lines.push('');

  // 1. SP-relevant standings context (compact)
  if (DATA.standings && DATA.standings.all_cats_sp) {
    const high = DATA.standings.all_cats_sp.filter(c => (c.impact || 'normal') === 'high');
    if (high.length) {
      lines.push('SP 직접 영향 카테고리:');
      high.forEach(c => lines.push('- ' + c.category + ': ' + c.tier + ' — ' + c.note));
      lines.push('');
    }
  }

  // 2. 내 팀 SP 전체 — tier + 다음 등판 + stat
  // Streaming tier가 교체 1순위, Conditional은 보수적, Core는 보호.
  lines.push('## 내 팀 SP 전체');
  lines.push('');
  lines.push('태그 의미: [Core/Conditional/Streaming] = `0.50 ros_value + 0.30 team_fit + 0.20 reacquire`, 풀=내 로스터+active waiver SP/RP. ≥65 Core / 50~65 Conditional / <50 Streaming. ros_value=풀 percentile, team_fit=약점 카테고리 적합도, reacquire=%Ros. tier 정렬: Streaming(교체 1순위)→Conditional(보수적)→Core(보호).');
  lines.push('');
  const mySps = DATA.roster.filter(p => p.pitcher && (p.positions || []).includes('SP'));
  const spTiers = DATA.roster_sp_tiers || {};
  const spTierDetails = (DATA.roster_sp_tier_details || []).reduce(
    (acc, d) => { acc[d.player_id] = d; return acc; }, {}
  );
  const todaySpIds = new Set(DATA.sp_starting_today || []);
  const tomorrowSpIds = new Set(DATA.sp_starting_tomorrow || []);

  if (mySps.length === 0) {
    lines.push('- (내 SP 없음)');
  } else {
    const cols = ['IP', 'W', 'K', 'ERA', 'WHIP'];
    // 우리 로스터 SP는 6개 기간(7d/14d/30d/2026/projected/proj_ros) 전부 보유.
    // 단발 등판 가치는 단기(7d/14d) 폼이 결정적이고, 잔여 시즌 보유 가치는
    // proj_ros + 2026이 결정적이므로 모두 노출한다.
    const periods = [
      ['7d', '7d'], ['14d', '14d'], ['30d', '30d'],
      ['2026', '2026'], ['projected', '다음7일'], ['proj_ros', '잔여'],
    ];
    const periodHdr = periods.map(([, lbl]) => lbl + ' ' + cols.join('/')).join(' | ');
    const sep = ['---', '---', '---', '---'].concat(periods.map(() => '---')).join('|');
    lines.push('| 이름 | 슬롯 | tier | 다음 등판 | ' + periodHdr + ' |');
    lines.push('|' + sep + '|');
    // tier 정렬: Streaming → Conditional → Core (교체 후보 위로)
    const tierRank = { 'Streaming': 0, 'Conditional': 1, 'Core': 2 };
    const sorted = mySps.slice().sort((a, b) => {
      const ra = tierRank[spTiers[a.id]] ?? 99;
      const rb = tierRank[spTiers[b.id]] ?? 99;
      return ra - rb;
    });
    for (const p of sorted) {
      const periodCells = periods.map(([k]) => {
        const s = p.stats[k] || {};
        return cols.map(c => _fmt(c, s[c])).join('/');
      });
      const det = spTierDetails[p.id];
      const baseTier = spTiers[p.id] || '-';
      const tier = det && det.core_score != null
        ? baseTier + '·' + Number(det.core_score).toFixed(0)
        : baseTier;
      let nextStart = '-';
      if (todaySpIds.has(p.id)) nextStart = '🔄 오늘';
      else if (tomorrowSpIds.has(p.id)) nextStart = '🔄 내일';
      const slot = p.slot || '-';
      lines.push('| ' + p.name + ' | ' + slot + ' | ' + tier
        + ' | ' + nextStart + ' | ' + periodCells.join(' | ') + ' |');
    }
  }
  lines.push('');
  // tier 분해 — SP swap 결정에 component 근거 제공
  for (const h of _spTierBreakdownLines(mySps.map(p => p.id))) lines.push(h);

  // 3. 내일 등판 waiver SP — sp_streaming.all_candidates (이미 stream_score 정렬)
  lines.push('## 내일 등판 waiver SP 후보 (stream_score 정렬)');
  lines.push('');
  // Prose from shared Python constants (sp_streaming_prompt_text.py).
  lines.push(..._SP_PROSE.tier_guide);
  lines.push('');
  lines.push(..._SP_PROSE.score_formula);
  lines.push('');
  // 4-tier label helper (mirrors sp_streaming.stream_score_label)
  function _streamTierLabel(s) {
    if (s == null) return '-';
    if (s >= 0.70) return 'Auto-Start';
    if (s >= 0.50) return 'Probably';
    if (s >= 0.30) return 'Questionable';
    return 'Skip';
  }
  const candidates = DATA.sp_stream_compare || [];
  if (candidates.length === 0) {
    lines.push('- (내일 등판 후보 데이터 없음 — cached 모드이거나 F-04c 미실행)');
  } else {
    // 우리 SP 표와 동일한 6 기간을 노출하되 waiver 측은 시즌 키가 'season'.
    // 컬럼: 후보·팀·시작일 + score 4종 + 6 기간(IP/W/K/ERA/WHIP) + %Ros·injury.
    const streamPeriods = [
      {key: '7d',        label: '7d'},
      {key: '14d',       label: '14d'},
      {key: '30d',       label: '30d'},
      {key: 'season',    label: 'season'},
      {key: 'projected', label: '다음7일'},
      {key: 'proj_ros',  label: '잔여'},
    ];
    const sCols = ['IP', 'W', 'K', 'ERA', 'WHIP'];
    const periodHeader = streamPeriods.map(
      pe => pe.label + ' ' + sCols.join('/')
    ).join(' | ');
    // 2-start 판정: c.stats.projected.GP ≥ 2 또는 week_ip / per_start ≥ 2.
    // GP 결측 시 week_ip 기반 추정 (calc_stream_score 동일 로직 재현).
    function _isTwoStart(c) {
      const p = (c.stats || {}).projected || {};
      const gp = p.GP;
      if (gp != null) return gp >= 2 ? '✅' : '—';
      const weekIp = p.IP || 0;
      if (weekIp <= 0) return '?';
      return Math.round(weekIp / 5.5) >= 2 ? '✅' : '—';
    }

    const fixedCols = 9;  // 후보·팀·시작일·stream·tier·qs_prob·proj_IP·2-start·components
    const tailCols = 2;   // %Ros · injury
    const sepParts = []
      .concat(Array(fixedCols).fill('---'))
      .concat(streamPeriods.map(() => '---'))
      .concat(Array(tailCols).fill('---'))
      .join('|');
    lines.push('| 후보 | 팀 | 시작일 | stream | tier | qs_prob | proj_IP | 2-start | acc/safety/form/matchup/pq/vegas | '
      + periodHeader + ' | %Ros | injury |');
    lines.push('|' + sepParts + '|');
    const top = candidates.slice(0, 12);
    for (const c of top) {
      const comp = c.components || {};
      const compStr = ['accumulation', 'ratio_safety', 'recent_form', 'matchup', 'pitch_quality', 'vegas_implied']
        .map(k => comp[k] == null ? '-' : Number(comp[k]).toFixed(2)).join('/');
      const periodCells = streamPeriods.map(pe => {
        const s = (c.stats || {})[pe.key] || {};
        return sCols.map(cc => _fmt(cc, s[cc])).join('/');
      });
      const ros = (c.ownership != null) ? Number(c.ownership).toFixed(0) + '%' : '-';
      const tierLabel = _streamTierLabel(c.stream_score);
      const twoStart = _isTwoStart(c);
      lines.push('| ' + c.name + ' | ' + c.team + ' | ' + c.start_date
        + ' | ' + Number(c.stream_score).toFixed(3)
        + ' | ' + tierLabel
        + ' | ' + Number(c.qs_prob).toFixed(2)
        + ' | ' + Number(c.projected_ip).toFixed(1)
        + ' | ' + twoStart
        + ' | ' + compStr + ' | '
        + periodCells.join(' | ')
        + ' | ' + ros + ' | ' + (c.injury || '-') + ' |');
    }

    // 2-a. 상위 5명 stream_score 분해 — 왜 그 tier 인가 component 가시화
    const topFive = candidates.slice(0, 5);
    if (topFive.length) {
      lines.push('');
      lines.push('### Stream Score 상위 5명 분해 (왜 이 tier 인가)');
      lines.push('');
      lines.push(_SP_PROSE.top5_header);
      lines.push(_SP_PROSE.top5_separator);
      for (const c of topFive) {
        const comp = c.components || {};
        const _f = (k) => comp[k] == null ? '-' : Number(comp[k]).toFixed(2);
        const ros = (c.ownership != null) ? Number(c.ownership).toFixed(0) + '%' : '-';
        lines.push('| ' + c.name
          + ' | ' + _streamTierLabel(c.stream_score)
          + ' | ' + Number(c.stream_score).toFixed(3)
          + ' | ' + ros
          + ' | ' + _f('pitch_quality')
          + ' | ' + _f('recent_form')
          + ' | ' + _f('vegas_implied')
          + ' | ' + _f('accumulation')
          + ' | ' + _f('ratio_safety')
          + ' | ' + _f('matchup')
          + ' | ' + Number(c.qs_prob).toFixed(2)
          + ' | ' + _isTwoStart(c)
          + ' |');
      }
      lines.push('');
      lines.push(..._SP_PROSE.interpretation_guide);
    }
  }
  lines.push('');

  // 4. 결정 가이드 + 답변 형식 — shared prose
  lines.push('## 결정');
  lines.push('');
  lines.push(..._SP_PROSE.decision_header);
  lines.push('');
  lines.push(..._SP_PROSE.decision_criteria);
  lines.push('');
  lines.push(..._SP_PROSE.warnings);
  lines.push('');
  lines.push(..._SP_PROSE.response_format);

  return lines.join('\n');
}

  const panel = document.querySelector('.prompt-panel');

// ── Batter team-level pickup prompt ──────────────────────────────────────────

function _batterRoster() {
  // 타자 자격(_BAT_POSITIONS) 가진 모든 로스터 선수. IL 제외.
  return DATA.roster.filter(p =>
    !p.pitcher
    && (p.positions || []).some(pos => _BAT_POSITIONS.includes(pos))
    && !(p.slot || '').startsWith('IL')
  );
}

function _batterCandidatesForPos(positionType, n) {
  // 2축 union: proj_ros 합성(잔여 가치) + 2026 시즌 합성(시즌 검증).
  // 각 축 상위 절반씩, 듀얼 자격은 multiplier로 약간 가산.
  const pool = (DATA.available[positionType] || []).slice();
  const halfN = Math.ceil(n / 2);
  function _projStats(p)   { return p.stats['proj_ros'] || {}; }
  function _seasonStats(p) { return p.stats['2026'] || p.stats['season'] || {}; }
  function _scoreProj(p)   { return _batScore(_projStats(p))   * _dualBonus(p.positions); }
  function _scoreSeason(p) { return _batScore(_seasonStats(p)) * _dualBonus(p.positions); }
  const byProj = [...pool].sort((a, b) => _scoreProj(b)   - _scoreProj(a)).slice(0, halfN);
  const bySea  = [...pool].sort((a, b) => _scoreSeason(b) - _scoreSeason(a)).slice(0, halfN);
  const seen = new Set();
  const result = [];
  for (const p of byProj) {
    if (!seen.has(p.id)) { seen.add(p.id); result.push(p); }
  }
  for (const p of bySea) {
    if (!seen.has(p.id)) { seen.add(p.id); result.push(p); }
  }
  return result;
}

// 우리 로스터 타자도 6개 기간(7d/14d/30d/2026/projected/proj_ros) 모두 보유.
// SP/RP 표와 동일한 형식으로 한 행에서 단기 폼·시즌 누적·잔여 가치를 비교.
const _BATTER_PERIODS = [
  {key: '7d',        label: '7d'},
  {key: '14d',       label: '14d'},
  {key: '30d',       label: '30d'},
  {key: '2026',      label: '2026'},
  {key: 'projected', label: '다음7일'},
  {key: 'proj_ros',  label: '잔여'},
];

function _batterTableHeader() {
  const cols = DATA.batter_stats;
  const periodHeaders = _BATTER_PERIODS.map(
    pe => pe.label + ' ' + cols.join('/')
  ).join(' | ');
  const sep = ['---', '---', '---'].concat(_BATTER_PERIODS.map(() => '---')).join('|');
  return [
    '| 선수 | 슬롯 | 부상 | ' + periodHeaders + ' |',
    '|' + sep + '|',
  ];
}

function _renderBatterRow(p, opts) {
  // opts.targetPosition: 현재 분석 포지션. 듀얼 자격 표시할 때 비교용.
  opts = opts || {};
  const cols = DATA.batter_stats;
  const periodCells = _BATTER_PERIODS.map(pe => {
    const s = p.stats[pe.key] || {};
    return cols.map(c => _fmt(c, s[c])).join('/');
  });
  const tierMap = DATA.roster_batter_tiers || {};
  const batTierDetails = (DATA.roster_batter_tier_details || []).reduce(
    (acc, d) => { acc[d.player_id] = d; return acc; }, {}
  );
  const tags = [];
  if (tierMap[p.id]) {
    const det = batTierDetails[p.id];
    const score = det && det.core_score != null
      ? '·' + Number(det.core_score).toFixed(0)
      : '';
    tags.push(tierMap[p.id] + score);
  }
  for (const r of _calcRiskTags(p)) tags.push(r);
  const tagStr = tags.length ? ' [' + tags.join('·') + ']' : '';

  let slot = p.slot || '-';
  if (opts.showOtherPositions) {
    const batPos = (p.positions || []).filter(pos => _BAT_POSITIONS.includes(pos));
    if (opts.targetPosition) {
      const others = batPos.filter(pos => pos !== opts.targetPosition);
      if (others.length) slot += ' (' + others.join('/') + ' 자격)';
    } else if (batPos.length > 1) {
      slot += ' (' + batPos.join('/') + ')';
    }
  }
  return '| ' + p.name + tagStr + ' | ' + slot + ' | ' + p.injury
    + ' | ' + periodCells.join(' | ') + ' |';
}

function _batterStandingsBlock(lines) {
  // 타자 결정 컨텍스트 — categorize.py의 'Batter' 분류.
  if (!DATA.standings) return;
  const st = DATA.standings;
  const cats = st.all_cats_bat;
  lines.push('## 우리 팀: ' + st.my_team_name + ' (' + st.total_teams + '팀 Roto)');
  lines.push('');
  lines.push('| 카테고리 | 내 순위 | 내 값 | 1위 값 |');
  lines.push('|---|---|---|---|');
  for (const c of cats) {
    lines.push('| ' + c.category + ' | ' + c.rank + '위 | '
      + _fmtCat(c.category, c.value) + ' | '
      + _fmtCat(c.category, c.value_leader) + ' |');
  }
  lines.push('');
  lines.push('### 카테고리 우선순위 (타자 픽업 관점)');
  lines.push('');
  lines.push('이 결정: 타자 픽업 — R·HR·RBI·SB·AVG·OPS 직접 영향.');
  lines.push('');
  const grp = {high: [], low: [], normal: []};
  for (const c of cats) {
    const k = c.impact || 'normal';
    if (grp[k]) grp[k].push('- ' + c.category + ': ' + c.tier + ' — ' + c.note);
  }
  if (grp.high.length) {
    lines.push('직접 영향 (이 결정으로 따낼 수 있는 점수):');
    grp.high.forEach(l => lines.push(l));
    lines.push('');
  }
  if (grp.low.length) {
    lines.push('한계 영향:');
    grp.low.forEach(l => lines.push(l));
    lines.push('');
  }
  if (grp.normal.length) {
    lines.push('참고:');
    grp.normal.forEach(l => lines.push(l));
    lines.push('');
  }
}

function buildBatterPickupPrompt(positionType) {
  // positionType: 'C' / '1B' / '2B' / '3B' / 'SS' / 'OF'
  const lines = [];
  lines.push('[데이터 기준: ' + DATA.meta.generated_at + ']');
  lines.push(_tierMetaLine());
  lines.push('');

  _batterStandingsBlock(lines);

  // 내 진영 — 해당 포지션 자격 보유한 모든 타자 (BN/슬롯 포함)
  const myPlayers = _batterRoster().filter(p =>
    (p.positions || []).includes(positionType)
  );
  lines.push('## 내 ' + positionType + ' 자격 선수 (' + myPlayers.length + '명)');
  lines.push('');
  lines.push('태그 의미: [Core/Conditional/Fringe] = `0.30 asset + 0.25 reacquire + 0.25 ros_outlook + 0.20 team_fit`, 풀=내 로스터 타자. ≥65 Core / 45~65 Conditional / <45 Fringe (OUT 부상은 강제 Fringe). asset=preseason+current rank (시즌 진행도 자동 가중: 4월 60/40 → 9월 20/80), ros_outlook=R/HR/RBI/SB/AVG/OPS 6-cat z-score sigmoid, team_fit=약점 카테고리 적합도. [⚠️/ℹ️] = 위험·데이터 신호 (절대 gap **OR 비율 gap**). 슬롯 옆 (X/Y 자격) = 다중 포지션 자격.');
  lines.push('');
  const cols = DATA.batter_stats;
  for (const h of _batterTableHeader()) lines.push(h);
  for (const p of myPlayers) {
    lines.push(_renderBatterRow(p, {showOtherPositions: true, targetPosition: positionType}));
  }
  lines.push('');
  // tier 분해 — 해당 포지션 자격 우리 타자 (왜 이 tier인지 component 가시화)
  for (const h of _batterTierBreakdownLines(
    myPlayers.map(p => p.id), '우리 ' + positionType + ' 자격 선수'
  )) lines.push(h);

  // Available 후보 — 이 포지션 풀에서 30명 (2축 union)
  const candidates = _batterCandidatesForPos(positionType, 30);
  lines.push('## ' + positionType + ' 보강 후보 (' + candidates.length + '명, proj_ros 상위 15 ∪ 2026 시즌 상위 15, 다중 자격은 ×1.05~1.10 가산)');
  lines.push('');
  for (const ap of candidates) {
    const hotTag = ap.is_hot ? ' 🔥' : '';
    const risk = _calcRiskTags(ap);
    const riskStr = risk.length ? ' [' + risk.join('·') + ']' : '';
    const otherPos = (ap.positions || []).filter(p => _BAT_POSITIONS.includes(p) && p !== positionType);
    const dualStr = otherPos.length ? ' (' + otherPos.join('/') + ' 자격)' : '';
    lines.push('### ' + ap.name + ' (' + ap.team + ')' + hotTag + riskStr + dualStr
      + '  픽업률 ' + (ap.add_pct || 0) + '%  부상: ' + ap.injury);
    lines.push(_tableHeader(cols));
    for (const period of DATA.periods) {
      const label = DATA.period_labels[period];
      // "7d → projected" fallback은 잘못된 매핑 (next 7d projection을 last 7d
      // 실측으로 표시). 제거. "2026 → season"은 같은 시즌 누적이라 OK.
      const stats = ap.stats[period]
        || (period === '2026' ? ap.stats['season'] : null)
        || null;
      lines.push(_tableRow(label, stats, cols));
    }
    lines.push('');
  }

  // 요청 + 답변 형식
  lines.push('## 요청');
  lines.push('');
  lines.push('내 ' + positionType + ' 자격 선수와 위 후보를 비교해서, 보강 결정을 내려라.');
  lines.push('- 직접 영향 카테고리(공략권) 기준으로 어느 카테고리를 우선 공략할지 명확히');
  lines.push('- 잔여시즌 R+RBI+HR+SB×1.5 합성 점수와 14일 폼을 함께 비교');
  lines.push('- 다중 포지션 자격은 라인업 유연성으로 약간의 가치 가산 (자격 1개 더 = ×1.05)');
  lines.push('- **위험 태그 규칙**: `[⚠️⚠️ 추천 위험]` = 1순위 금지 / `[⚠️ 시즌 부진]` `[⚠️ 폼 하락]` = ratio 리스크 명시 필수 / `[ℹ️ 데이터 없음]` = 약한 음성 신호 (waiver 정렬 상위 미달, 부상 예외) / `[ℹ️ 표본 부족]` = stats 있지만 표본 작아 noise 가능, 1순위 추천 시 표본 작음 명시');
  lines.push('- "보강 안 하고 Hold"가 정답이면 그렇게 답해도 됨');
  lines.push('');
  _appendBatterAnswerFormat(lines, 'pos');

  return lines.join('\n');
}

function buildBatterAllPickupPrompt() {
  // 종합: 모든 타자 + 모든 포지션 후보 10명씩 = 60명. LLM이 어느 포지션
  // 보강이 가장 효율적인지부터 판단.
  const lines = [];
  lines.push('[데이터 기준: ' + DATA.meta.generated_at + ']');
  lines.push(_tierMetaLine());
  lines.push('');

  _batterStandingsBlock(lines);

  // 내 진영 — 모든 타자 (한 표에)
  const myPlayers = _batterRoster();
  lines.push('## 내 타자 진영 (' + myPlayers.length + '명)');
  lines.push('');
  lines.push('태그 의미: [Core/Conditional/Fringe] = `0.30 asset + 0.25 reacquire + 0.25 ros_outlook + 0.20 team_fit`, 풀=내 로스터 타자. ≥65 Core / 45~65 Conditional / <45 Fringe (OUT 강제 Fringe). asset 시즌 진행도 가중, ros_outlook은 6-cat z-score sigmoid, team_fit은 약점 카테고리 적합도. [⚠️/ℹ️] = 위험·데이터 신호 (절대 gap **OR 비율 gap**). 슬롯 옆 (X/Y) = 다중 포지션 자격.');
  lines.push('');
  const cols = DATA.batter_stats;
  for (const h of _batterTableHeader()) lines.push(h);
  for (const p of myPlayers) {
    lines.push(_renderBatterRow(p, {showOtherPositions: true}));
  }
  lines.push('');
  // tier 분해 — 우리 타자 전체 (포지션별 의사결정에 component 근거 제공)
  for (const h of _batterTierBreakdownLines(
    myPlayers.map(p => p.id), '우리 타자 전체'
  )) lines.push(h);

  // 포지션별 후보 — 각 10명씩 union (중복 제거)
  const seen = new Set();
  const sectioned = {};
  for (const pos of _BAT_POSITIONS) {
    sectioned[pos] = [];
    const cands = _batterCandidatesForPos(pos, 10);
    for (const ap of cands) {
      if (!seen.has(ap.id)) { seen.add(ap.id); sectioned[pos].push(ap); }
    }
  }
  const totalCands = Object.values(sectioned).reduce((s, arr) => s + arr.length, 0);

  lines.push('## 포지션별 보강 후보 (총 ' + totalCands + '명, 포지션마다 proj_ros 5 ∪ 2026 시즌 5)');
  lines.push('');
  lines.push('각 포지션 섹션은 그 포지션 자격 후보. 다중 자격이면 첫 등장 포지션에만 표시 (다른 포지션 자격은 슬롯 옆 표시). 카테고리 임팩트는 같은 "타자 픽업 관점" 기준.');
  lines.push('');
  // 후보 표도 우리 타자 표와 동일한 6 기간(7d/14d/30d/2026/projected/proj_ros)
  // 으로 보여 — Phase 1+2 enrichment 덕에 waiver 후보도 stat 보강됨.
  const periodHdrCells = _BATTER_PERIODS.map(
    pe => pe.label + ' ' + cols.join('/')
  ).join(' | ');
  const periodSep = ['---', '---']
    .concat(_BATTER_PERIODS.map(() => '---'))
    .concat(['---', '---'])
    .join('|');
  for (const pos of _BAT_POSITIONS) {
    const list = sectioned[pos];
    if (!list.length) continue;
    lines.push('### ' + pos + ' (' + list.length + '명)');
    lines.push('');
    lines.push('| 선수 | 팀 | ' + periodHdrCells + ' | 픽업률 | 위험 태그 |');
    lines.push('|' + periodSep + '|');
    for (const ap of list) {
      const periodCells = _BATTER_PERIODS.map(pe => {
        // waiver enrich는 시즌 누적을 'season' 키에 저장하고, 로스터 스크래퍼는
        // '2026' 키에 저장한다. 같은 의미라 키만 다른 데이터를 alias 처리.
        let s = ap.stats[pe.key] || {};
        if (Object.keys(s).length === 0 && pe.key === '2026') {
          s = ap.stats['season'] || {};
        }
        return cols.map(c => _fmt(c, s[c])).join('/');
      });
      const otherPos = (ap.positions || []).filter(p => _BAT_POSITIONS.includes(p) && p !== pos);
      const nameWithDual = ap.name + (otherPos.length ? ' (+' + otherPos.join('/') + ')' : '');
      const risk = _calcRiskTags(ap);
      const riskStr = risk.length ? risk.join('·') : '—';
      const hot = ap.is_hot ? ' 🔥' : '';
      lines.push('| ' + nameWithDual + hot + ' | ' + ap.team + ' | '
        + periodCells.join(' | ') + ' | ' + (ap.add_pct || 0) + '% | ' + riskStr + ' |');
    }
    lines.push('');
  }

  lines.push('## 요청');
  lines.push('');
  lines.push('내 타자 진영 전체를 보고, 어느 포지션 보강이 가장 효율적인지 판단해라.');
  lines.push('- 직접 영향 카테고리(공략권) 기준으로 어떤 스탯 공략이 가장 큰 효과인지 먼저 결정');
  lines.push('- 그 다음 그 스탯에 가장 많이 기여할 포지션·후보 선정');
  lines.push('- 잔여시즌 R+RBI+HR+SB×1.5 합성 + 14일 폼 + 카테고리 임팩트 종합');
  lines.push('- 다중 포지션 자격은 라인업 유연성 가산 (자격 1개 더 = 가치 ×1.05)');
  lines.push('- **위험 태그 규칙**: `[⚠️⚠️ 추천 위험]` = 1순위 금지 / `[⚠️ 시즌 부진]` `[⚠️ 폼 하락]` = ratio 리스크 명시 필수 / `[ℹ️ 데이터 없음]` = 약한 음성 신호 (waiver 정렬 상위 미달, 부상 예외) / `[ℹ️ 표본 부족]` = stats 있지만 표본 작아 noise 가능, 1순위 추천 시 표본 작음 명시');
  lines.push('- "어디도 보강 불필요(Hold)"가 정답이면 그렇게 답해도 됨');
  lines.push('');
  _appendBatterAnswerFormat(lines, 'all');

  return lines.join('\n');
}

function selectBatterPickup(positionType) {
  _activeId = '_batpickup_' + positionType;
  document.querySelectorAll('.pickup-btn').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById('pickup-btn-bat-' + positionType);
  if (btn) btn.classList.add('active');

  const prompt = positionType === 'all'
    ? buildBatterAllPickupPrompt()
    : buildBatterPickupPrompt(positionType);
  _statsBlob = null;

  document.getElementById('placeholder').style.display = 'none';
  const content = document.getElementById('prompt-content');
  content.style.display = 'flex';
  content.style.flexDirection = 'column';
  content.style.flex = '1';
  content.style.overflow = 'hidden';

  const label = positionType === 'all' ? '타자 종합 분석' : positionType + ' 보강 분석';
  document.getElementById('prompt-player').textContent = '📊 ' + label;

  const ta = document.getElementById('prompt-text');
  ta.value = prompt;
  const n = prompt.length;
  const cc = document.getElementById('char-count');
  cc.textContent = n.toLocaleString() + ' 자';
  cc.className = 'char-count' + (n > DATA.char_limit ? ' over' : '');
  const banner = document.getElementById('limit-banner');
  if (n > DATA.char_limit) {
    banner.style.display = 'flex';
    _statsBlob = new Blob([prompt], { type: 'text/plain;charset=utf-8' });
  } else {
    banner.style.display = 'none';
  }
  document.getElementById('copy-feedback').style.display = 'none';
  _scrollPromptIntoView();
}


function selectPitcherPickup(pitcherType) {
  _activeId = '_pickup_' + pitcherType;

  document.querySelectorAll('.pickup-btn').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById('pickup-btn-' + pitcherType);
  if (btn) btn.classList.add('active');

  const prompt = buildPitcherPickupPrompt(pitcherType);
  _statsBlob = null;

  document.getElementById('placeholder').style.display = 'none';
  const content = document.getElementById('prompt-content');
  content.style.display = 'flex';
  content.style.flexDirection = 'column';
  content.style.flex = '1';
  content.style.overflow = 'hidden';

  document.getElementById('prompt-player').textContent =
    '📊 ' + pitcherType + ' 보강 분석';

  const ta = document.getElementById('prompt-text');
  ta.value = prompt;

  const n = prompt.length;
  const cc = document.getElementById('char-count');
  cc.textContent = n.toLocaleString() + ' 자';
  cc.className = 'char-count' + (n > DATA.char_limit ? ' over' : '');

  const banner = document.getElementById('limit-banner');
  if (n > DATA.char_limit) {
    banner.style.display = 'flex';
    _statsBlob = new Blob([prompt], { type: 'text/plain;charset=utf-8' });
  } else {
    banner.style.display = 'none';
  }

  document.getElementById('copy-feedback').style.display = 'none';
  _scrollPromptIntoView();
}


function copyPrompt() {
  const ta = document.getElementById('prompt-text');
  if (!ta.value) return;
  navigator.clipboard.writeText(ta.value).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.textContent = '✅ 복사됨';
    btn.classList.add('copied');
    const fb = document.getElementById('copy-feedback');
    fb.style.display = 'block';
    setTimeout(() => {
      btn.textContent = '📋 복사';
      btn.classList.remove('copied');
    }, 2000);
  });
}

function downloadStats() {
  if (!_statsBlob) return;
  const a = document.createElement('a');
  a.href = URL.createObjectURL(_statsBlob);
  a.download = 'stats_' + (_activeId || 'player') + '.md';
  a.click();
}

function renderRoster() {
  const panel = document.getElementById('roster-panel');
  panel.innerHTML = '';

  // Pickup section: SP / RP team-level pickup prompt buttons
  const pickupDiv = document.createElement('div');
  pickupDiv.className = 'pickup-section';
  pickupDiv.innerHTML = '<div class="pos-label">📊 투수진 보강 프롬프트</div>';
  for (const t of ['SP', 'RP']) {
    const b = document.createElement('button');
    b.className = 'pickup-btn';
    b.id = 'pickup-btn-' + t;
    b.textContent = t + ' 보강 분석';
    b.onclick = () => selectPitcherPickup(t);
    pickupDiv.appendChild(b);
  }
  // 내일 SP 스트림 비교 — 1일 swap decision (내 SP vs 내일 등판 waiver SP)
  {
    const b = document.createElement('button');
    b.className = 'pickup-btn';
    b.id = 'pickup-btn-SP-stream';
    b.textContent = '내일 SP 스트림 비교';
    b.onclick = () => selectSPStreamCompare();
    pickupDiv.appendChild(b);
  }
  panel.appendChild(pickupDiv);

  // Batter pickup section: 6 positions + 1 종합
  const batPickupDiv = document.createElement('div');
  batPickupDiv.className = 'pickup-section';
  batPickupDiv.innerHTML = '<div class="pos-label">📊 타자 보강 프롬프트</div>';
  for (const t of _BAT_POSITIONS) {
    const b = document.createElement('button');
    b.className = 'pickup-btn';
    b.id = 'pickup-btn-bat-' + t;
    b.textContent = t + ' 보강 분석';
    b.onclick = () => selectBatterPickup(t);
    batPickupDiv.appendChild(b);
  }
  const allBtn = document.createElement('button');
  allBtn.className = 'pickup-btn';
  allBtn.id = 'pickup-btn-bat-all';
  allBtn.textContent = '타자 종합 분석';
  allBtn.onclick = () => selectBatterPickup('all');
  batPickupDiv.appendChild(allBtn);
  panel.appendChild(batPickupDiv);
}

document.addEventListener('DOMContentLoaded', renderRoster);

</script>
</body>
</html>
