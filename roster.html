<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI 프롬프트 빌더 — Fantasy Baseball</title>
<style>
:root {
  --bg: #0d1117; --surface: #161b22; --surface2: #21262d;
  --border: #30363d; --text: #e6edf3; --muted: #8b949e;
  --blue: #58a6ff; --green: #3fb950; --yellow: #d29922;
  --red: #f85149; --accent: #1f6feb;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
       background: var(--bg); color: var(--text); font-size: 14px; }
a { color: var(--blue); text-decoration: none; }
a:hover { text-decoration: underline; }

/* Header */
.page-header { background: var(--surface); border-bottom: 1px solid var(--border);
               padding: 14px 20px; display: flex; align-items: center;
               justify-content: space-between; flex-wrap: wrap; gap: 8px; }
.page-header h1 { font-size: 1.1rem; }
.header-meta { display: flex; align-items: center; gap: 16px; color: var(--muted); font-size: 0.85rem; }

/* Layout */
.layout { display: flex; height: calc(100vh - 53px); overflow: hidden; }

/* Roster panel */
.roster-panel { width: 260px; min-width: 220px; background: var(--surface);
                border-right: 1px solid var(--border);
                overflow-y: auto; padding: 12px 8px; flex-shrink: 0; }
.pos-group { margin-bottom: 16px; }
.pos-label { font-size: 0.75rem; font-weight: 700; color: var(--muted);
             text-transform: uppercase; letter-spacing: 0.08em;
             padding: 4px 8px; margin-bottom: 4px; }
.player-btn { display: flex; align-items: center; gap-8px; width: 100%;
              background: none; border: 1px solid transparent; border-radius: 6px;
              color: var(--text); padding: 7px 10px; cursor: pointer; text-align: left;
              font-size: 0.88rem; gap: 6px; transition: all 0.12s; }
.player-btn:hover { background: var(--surface2); border-color: var(--border); }
.player-btn.active { background: var(--accent); border-color: var(--blue); color: #fff; }
.player-btn .pname { flex: 1; font-weight: 500; }
.player-btn .ptag { font-size: 0.72rem; color: var(--muted); }
.player-btn.active .ptag { color: rgba(255,255,255,0.75); }
.player-btn .injury-dot { width: 6px; height: 6px; border-radius: 50%;
                           background: var(--green); flex-shrink: 0; }
.player-btn .injury-dot.ill { background: var(--red); }
.player-btn .injury-dot.dtd { background: var(--yellow); }

/* Prompt panel */
.prompt-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.placeholder { flex: 1; display: flex; flex-direction: column;
               align-items: center; justify-content: center;
               color: var(--muted); font-size: 1rem; line-height: 2; text-align: center; }
.placeholder .arrow { font-size: 2rem; margin-bottom: 8px; }

.prompt-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.prompt-toolbar { display: flex; align-items: center; justify-content: space-between;
                  padding: 10px 16px; background: var(--surface);
                  border-bottom: 1px solid var(--border); gap: 12px; flex-wrap: wrap; }
.prompt-player { font-weight: 600; font-size: 0.95rem; }
.prompt-actions { display: flex; align-items: center; gap: 10px; }
.char-count { font-size: 0.8rem; color: var(--muted); }
.char-count.over { color: var(--red); font-weight: 600; }
.copy-btn { background: var(--accent); border: none; color: #fff;
            border-radius: 6px; padding: 6px 14px; cursor: pointer;
            font-size: 0.85rem; font-weight: 500; transition: opacity 0.15s; }
.copy-btn:hover { opacity: 0.85; }
.copy-btn.copied { background: var(--green); }

.limit-banner { background: rgba(248,81,73,0.12); border-bottom: 1px solid var(--red);
                padding: 8px 16px; font-size: 0.83rem; color: var(--red);
                display: flex; align-items: center; gap: 10px; }
.limit-banner button { background: var(--red); border: none; color: #fff;
                        border-radius: 4px; padding: 4px 10px; cursor: pointer;
                        font-size: 0.8rem; }

.copy-feedback { padding: 6px 16px; background: rgba(63,185,80,0.15);
                 color: var(--green); font-size: 0.82rem; border-bottom: 1px solid var(--border); }

#prompt-text { flex: 1; background: var(--bg); color: var(--text);
               border: none; resize: none; padding: 16px;
               font-family: "SF Mono", "Fira Code", Consolas, monospace;
               font-size: 0.82rem; line-height: 1.55; outline: none; }

/* Mobile */
@media (max-width: 640px) {
  .layout { flex-direction: column; height: auto; overflow: visible; }
  .roster-panel { width: 100%; height: auto; border-right: none;
                  border-bottom: 1px solid var(--border); max-height: 240px; }
  .prompt-panel { height: 70vh; }
}
</style>
</head>

od_labels":{"7d":"최근 7일","14d":"최근 14일","30d":"최근 30일","2026":"2026 시즌","proj_ros":"잔여 시즌"},"char_limit":500000,"batter_stats":["R","HR","RBI","SB","AVG","OPS"],"pitcher_stats":["IP","W","K","ERA","WHIP","SV+H"]};

let _activeId = null;
let _statsBlob = null;

function _fmt(col, val) {
  if (val === null || val === undefined) return '—';
  if (['AVG','OPS','ERA','WHIP'].includes(col)) return val.toFixed(3);
  if (col === 'IP') return val.toFixed(1);
  return String(Math.round(val));
}

function _tableHeader(cols) {
  return '| 기간 | ' + cols.join(' | ') + ' |\n'
       + '|------|-' + cols.map(() => '---').join('-|-') + '-|';
}

function _tableRow(label, stats, cols) {
  const vals = cols.map(c => _fmt(c, stats ? stats[c] : null));
  return '| ' + label + ' | ' + vals.join(' | ') + ' |';
}

function buildPrompt(player) {
  const cols = player.pitcher ? DATA.pitcher_stats : DATA.batter_stats;
  const lines = [];

  lines.push('[데이터 기준: ' + DATA.meta.generated_at + ']');
  lines.push('');
  lines.push('## 내 선수: ' + player.name + ' (' + player.positions.join('/') + ')');
  lines.push('팀: ' + player.team + ' | 부상: ' + player.injury + ' | 슬롯: ' + (player.slot || '—'));
  lines.push('');
  lines.push(_tableHeader(cols));
  for (const p of DATA.periods) {
    const label = DATA.period_labels[p];
    lines.push(_tableRow(label, player.stats[p], cols));
  }

  // Collect available players: union of all positions, dedup by id
  const seen = new Set();
  const avail = [];
  for (const pos of player.positions) {
    for (const ap of (DATA.available[pos] || [])) {
      if (!seen.has(ap.id)) { seen.add(ap.id); avail.push(ap); }
    }
  }
  avail.sort((a, b) => (b.add_pct || 0) - (a.add_pct || 0));
  const top50 = avail.slice(0, 50);

  lines.push('');
  lines.push('## 같은 포지션 Available 선수 (상위 ' + top50.length + '명, 픽업률 순)');
  lines.push('');

  for (const ap of top50) {
    const apCols = ap.pitcher ? DATA.pitcher_stats : DATA.batter_stats;
    const hotTag = ap.is_hot ? ' 🔥' : '';
    lines.push('### ' + ap.name + ' (' + ap.team + ' · ' + ap.positions.join('/') + ')' + hotTag
              + '  픽업률 ' + (ap.add_pct || 0) + '%  부상: ' + ap.injury);
    lines.push(_tableHeader(apCols));
    for (const p of DATA.periods) {
      const label = DATA.period_labels[p];
      // "projected" fallback for 7d; "season" fallback for 2026 (waiver scraper uses "season" key)
      const stats = ap.stats[p]
        || (p === '7d'   ? ap.stats['projected'] : null)
        || (p === '2026' ? ap.stats['season']    : null)
        || null;
      lines.push(_tableRow(label, stats, apCols));
    }
    lines.push('');
  }

  lines.push('## 요청');
  lines.push('');
  lines.push('위 데이터를 바탕으로, 내 선수 ' + player.name + '보다 나은 available 선수를 추천해줘.');
  lines.push('- 현재 성적 트렌드(최근 7일 vs 시즌 전체)를 고려해줘');
  lines.push('- 부상 위험도나 최근 폼 하락이 있으면 언급해줘');
  lines.push('- 추천 이유를 구체적으로 설명해줘');

  return lines.join('\n');
}

function selectPlayer(id) {
  const player = DATA.roster.find(p => p.id === id);
  if (!player) return;
  _activeId = id;

  // Update active state
  document.querySelectorAll('.player-btn').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById('btn-' + id);
  if (btn) btn.classList.add('active');

  const prompt = buildPrompt(player);
  _statsBlob = null;

  document.getElementById('placeholder').style.display = 'none';
  const content = document.getElementById('prompt-content');
  content.style.display = 'flex';
  content.style.flexDirection = 'column';
  content.style.flex = '1';
  content.style.overflow = 'hidden';

  document.getElementById('prompt-player').textContent =
    player.name + ' (' + player.positions.join('/') + ') — ' + player.team;

  const ta = document.getElementById('prompt-text');
  ta.value = prompt;

  const n = prompt.length;
  const cc = document.getElementById('char-count');
  cc.textContent = n.toLocaleString() + ' 자';
  cc.className = 'char-count' + (n > DATA.char_limit ? ' over' : '');

  const banner = document.getElementById('limit-banner');
  if (n > DATA.char_limit) {
    banner.style.display = 'flex';
    _statsBlob = new Blob([prompt], { type: 'text/plain;charset=utf-8' });
  } else {
    banner.style.display = 'none';
  }

  document.getElementById('copy-feedback').style.display = 'none';
}

function copyPrompt() {
  const ta = document.getElementById('prompt-text');
  if (!ta.value) return;
  navigator.clipboard.writeText(ta.value).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.textContent = '✅ 복사됨';
    btn.classList.add('copied');
    const fb = document.getElementById('copy-feedback');
    fb.style.display = 'block';
    setTimeout(() => {
      btn.textContent = '📋 복사';
      btn.classList.remove('copied');
    }, 2000);
  });
}

function downloadStats() {
  if (!_statsBlob) return;
  const a = document.createElement('a');
  a.href = URL.createObjectURL(_statsBlob);
  a.download = 'stats_' + (_activeId || 'player') + '.md';
  a.click();
}

function renderRoster() {
  const panel = document.getElementById('roster-panel');
  panel.innerHTML = '';

  // Group by slot (position in lineup)
  const groups = {};
  for (const p of DATA.roster) {
    const key = p.slot || p.positions[0] || '?';
    (groups[key] = groups[key] || []).push(p);
  }

  // Canonical position order
  const order = ['C','1B','2B','3B','SS','OF','Util','DH','SP','RP','P','BN','IL-10','IL-15','IL-60'];
  const keys = [...new Set([...order.filter(k => groups[k]), ...Object.keys(groups)])];

  for (const key of keys) {
    const players = groups[key];
    if (!players) continue;
    const div = document.createElement('div');
    div.className = 'pos-group';
    div.innerHTML = '<div class="pos-label">' + key + '</div>';
    for (const p of players) {
      const injuryClass = p.injury === 'Healthy' ? '' : (p.injury.startsWith('IL') ? ' ill' : ' dtd');
      const btn = document.createElement('button');
      btn.className = 'player-btn';
      btn.id = 'btn-' + p.id;
      btn.innerHTML =
        '<span class="injury-dot' + injuryClass + '"></span>' +
        '<span class="pname">' + p.name + '</span>' +
        '<span class="ptag">' + p.team + '</span>';
      btn.onclick = () => selectPlayer(p.id);
      div.appendChild(btn);
    }
    panel.appendChild(div);
  }
}

document.addEventListener('DOMContentLoaded', renderRoster);

</script>
